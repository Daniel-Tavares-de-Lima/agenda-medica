<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Login — Agenda Médica</title>
  <style>
    /* CSS bem simples, só pra não ficar feio demais */
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; }
    label { display: block; margin-bottom: 12px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 16px; margin-top: 8px; }
    .erro { color: #b00020; }
  </style>
</head>
<body>
  <h1>Agenda Médica</h1>
  <h2>Login</h2>

  {% if error %}
  <p class="erro" role="alert">{{ error }}</p>
  {% endif %}

  <form method="post" action="{{ url_for('main.login') }}">
    <label>
      Usuário ou e-mail
      <input name="identifier" type="text" required autocomplete="username">
    </label>
    <label>
      Senha
      <input name="password" type="password" required autocomplete="current-password">
    </label>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
